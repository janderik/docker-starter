version: '3.9'

services:
  web:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - web-net
    restart: unless-stopped

  app:
    build: .
    ports:
      - '8000:8000'
    networks:
      - web-net
      - app-net
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=app
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=secret
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - app-net
    restart: unless-stopped

volumes:
  dbdata:

networks:
  web-net:
  app-net:
    internal: true
